replicaCount: 1

clusterName: default-cluster
image:
  repository: ghcr.io/gimlet-io/capacitor
  tag: v0.14.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  className: nginx
  host: capacitor.default.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
